name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and test
        run: |
          dotnet build --no-restore -c Release
          dotnet test SATUI.Tests/SATUI.Tests.csproj --no-build -c Release

      - name: Publish self-contained release
        run: >
          dotnet publish SATUI/SATUI.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:TrimMode=link
          -p:EnableTrimAnalyzer=false
          -o publish/

      - name: Build MSIX package
        shell: powershell
        run: |
          # Build MSIX using the Build-MSIX script
          & .\Build-MSIX.ps1 -PublishDir "publish" -OutputDir "release_artifacts" -Sign
          
          # Verify MSIX was created
          $msix = Get-Item release_artifacts/*.msix -ErrorAction SilentlyContinue
          if ($msix) {
            Write-Host "✓ MSIX package created: $($msix.Name) ($([math]::Round($msix.Length/1MB, 2)) MB)"
          } else {
            Write-Error "MSIX package not found!"
            exit 1
          }

      - name: Copy icon to published folder
        shell: powershell
        run: |
          Copy-Item "SATUI/Resources/satellite.ico" -Destination "publish/"

      - name: Create installer package
        shell: powershell
        run: |
          # Create a temporary directory for the installer package
          $tempDir = New-Item -ItemType Directory -Path "temp_installer" -Force
          
          # Copy publish folder to temp
          Copy-Item "publish/*" -Destination $tempDir -Recurse -Force
          
          # Copy install script to temp
          Copy-Item "Install-SATUI.ps1" -Destination $tempDir
          
          # Create a wrapper batch file that extracts and runs the installer
          $batchContent = @"
@echo off
setlocal enabledelayedexpansion
cd /d "%~dp0"
powershell -ExecutionPolicy Bypass -File "Install-SATUI.ps1" -InstallPath "%ProgramFiles%\SATUI"
pause
"@
          Set-Content -Path "$tempDir\Install.bat" -Value $batchContent
          
          # Create ZIP with installer
          Compress-Archive -Path "$tempDir/*" -DestinationPath "release_artifacts/SATUI-Setup.zip" -Force
          
          # Also create the full folder zip as portable fallback
          Compress-Archive -Path "publish/*" -DestinationPath "release_artifacts/SATUI-win-x64-portable.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: SATUI ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release_artifacts/*.msix
            release_artifacts/SATUI-Setup.zip
            release_artifacts/SATUI-win-x64-portable.zip
