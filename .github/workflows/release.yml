name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and test
        run: |
          dotnet build --no-restore -c Release
          dotnet test SATUI.Tests/SATUI.Tests.csproj --no-build -c Release

      - name: Publish self-contained release
        run: >
          dotnet publish SATUI/SATUI.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:TrimMode=link
          -p:EnableTrimAnalyzer=false
          -o publish/

      - name: Build MSIX package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release_artifacts" -Force | Out-Null
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & .\Build-MSIX.ps1 -PublishDir "publish" -OutputDir "release_artifacts" -Version $version
          $msix = Get-Item release_artifacts/*.msix -ErrorAction SilentlyContinue
          if ($msix) {
            Write-Host "MSIX package created: $($msix.Name) ($([math]::Round($msix.Length/1MB, 2)) MB)"
          } else {
            Write-Error "MSIX package not found!"
            exit 1
          }

      - name: Copy icon to published folder
        shell: pwsh
        run: |
          Copy-Item "SATUI/Resources/satellite.ico" -Destination "publish/"

      - name: Create installer package
        shell: pwsh
        run: |
          $tempDir = New-Item -ItemType Directory -Path "temp_installer" -Force
          Copy-Item "publish/*" -Destination $tempDir -Recurse -Force
          Copy-Item "Install-SATUI.ps1" -Destination $tempDir

          # Build batch file content without here-strings (avoids YAML indentation issues)
          $lines = '@echo off', 'setlocal enabledelayedexpansion', 'cd /d "%~dp0"',
                   'powershell -ExecutionPolicy Bypass -File "Install-SATUI.ps1" -InstallPath "%ProgramFiles%\SATUI"',
                   'pause'
          [System.IO.File]::WriteAllLines("$tempDir\Install.bat", $lines)

          Compress-Archive -Path "$tempDir/*" -DestinationPath "release_artifacts/SATUI-Setup.zip" -Force
          Compress-Archive -Path "publish/*" -DestinationPath "release_artifacts/SATUI-win-x64-portable.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: SATUI ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release_artifacts/*.msix
            release_artifacts/SATUI-Setup.zip
            release_artifacts/SATUI-win-x64-portable.zip
