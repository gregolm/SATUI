name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and test
        run: |
          dotnet build --no-restore -c Release
          dotnet test SATUI.Tests/SATUI.Tests.csproj --no-build -c Release

      - name: Publish self-contained EXE
        run: >
          dotnet publish SATUI/SATUI.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o publish/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SATUI ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: publish/SATUI.exe
